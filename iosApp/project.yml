# Especificación XcodeGen del proyecto iOS.
# En el Mac: `brew install xcodegen` y `xcodegen generate` en esta carpeta
# genera `MeteoMontana.xcodeproj` de forma reproducible (no hay que versionar
# el .xcodeproj binario).
#
# ⚠️ Escrito sin Mac (Fase C del plan pre-Mac): revisar versiones de Firebase
# y la ruta del framework al primer `xcodegen generate` + build en Xcode.
name: MeteoMontana
options:
  bundleIdPrefix: com.meteomontana
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"
  # Mapas (equivalente iOS de MapLibre Android). Distribución binaria oficial.
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    from: "6.0.0"

targets:
  MeteoMontana:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    # Entitlements: keychain-access-groups es obligatorio o FirebaseAuth falla
    # al persistir la sesión en el simulador (-34018). Firmamos ad-hoc (sin
    # Apple Developer), así que el prefijo de equipo va vacío.
    entitlements:
      path: iosApp/MeteoMontana.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.meteomontana.ios
        # Sign in with Apple: el CÓDIGO ya está (AuthBridge.signInWithApple +
        # botón en LoginView). Para ACTIVARLO en producción hay que:
        #  1) descomentar la línea de abajo (capability applesignin),
        #  2) tener cuenta Apple Developer de pago + habilitar la capability,
        #  3) habilitar Apple como proveedor en Firebase Auth (consola).
        # OJO: con la capability puesta, AltStore con Apple ID GRATIS NO podrá
        # firmar el .ipa (los free accounts no soportan Sign in with Apple) →
        # se rompería el sideload de pruebas. Por eso queda comentada hasta que
        # haya cuenta de pago.
        com.apple.developer.applesignin:
          - Default
        # Push (APNs/FCM): activado con cuenta Apple Developer de pago.
        aps-environment: production
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: Cumbre
        CFBundleLocalizations:
          - es
          - en
        CFBundleDevelopmentRegion: es
        # Versión espejo de Android (versionName 1.9 / versionCode 12).
        CFBundleShortVersionString: "1.9"
        CFBundleVersion: "12"
        UILaunchScreen: {}
        # Fuentes bundladas (mismas familias que Android: Source Serif 4 para
        # nombres/títulos, JetBrains Mono para eyebrows/dígitos).
        UIAppFonts:
          - SourceSerif4-Regular.ttf
          - SourceSerif4-Semibold.ttf
          - SourceSerif4-Bold.ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Bold.ttf
        # SwiftUI + Firebase: desactivar swizzling del AppDelegate.
        FirebaseAppDelegateProxyEnabled: false
        # Permite detectar si Google Maps está instalado (botón CÓMO LLEGAR).
        LSApplicationQueriesSchemes:
          - comgooglemaps
        # URL scheme para el callback de Google Sign-In. Es el REVERSED_CLIENT_ID
        # de GoogleService-Info.plist (proyecto Firebase climbingteams).
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.977545428920-i3vcsfvn6fpaos56h0se5tksb7p0mrvi
        NSLocationWhenInUseUsageDescription: >-
          Usamos tu ubicación para ordenar las escuelas por cercanía y
          mostrar tu posición en el mapa.
        # La app sube fotos (notas, topos de vías, foto de perfil): sin estas
        # cadenas iOS lanza una excepción al pedir acceso a cámara/galería.
        NSCameraUsageDescription: >-
          Para hacer fotos de las vías, escuelas o tu perfil.
        NSPhotoLibraryUsageDescription: >-
          Para elegir fotos de las vías, escuelas o tu perfil.
        # Encriptación exenta: la app solo usa HTTPS estándar del SO (no algoritmos propios).
        # Evita tener que subir documentación de encriptación a App Store Connect.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_NAME: MeteoMontana
        PRODUCT_BUNDLE_IDENTIFIER: com.meteomontana.ios
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        # El framework KMP se compila y embebe con una build phase de Gradle
        # (preBuildScripts), no como dependencia SPM.
        FRAMEWORK_SEARCH_PATHS: $(inherited) $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        # -lsqlite3: el driver nativo de SQLDelight (sqliter) en el framework
        # Shared referencia símbolos sqlite3_* del sistema.
        OTHER_LDFLAGS: $(inherited) -framework Shared -lsqlite3
      configs:
        # Debug: firma ad-hoc (sin Apple Developer, para CI ios-ci.yml y simulador).
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) DEBUG
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Manual
          CODE_SIGNING_REQUIRED: "NO"
        # Release: firma automática para App Store (ios-prod-ipa.yml).
        # Con CODE_SIGN_STYLE=Automatic Xcode elige la identidad solo; no poner CODE_SIGN_IDENTITY.
        Release:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: 3CP2YRJ579
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      # Push (FCM). El código (PushManager) está listo pero DESACTIVADO; activar
      # antes de publicar (necesita APNs key + capability, ver PushManager.swift).
      - package: Firebase
        product: FirebaseMessaging
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: MapLibre
        product: MapLibre
    preBuildScripts:
      - name: "Compilar y embeber el framework KMP (Shared)"
        basedOnDependencyAnalysis: false
        script: |
          # Xcode lanza los scripts con un entorno mínimo y sin JAVA_HOME, así
          # que gradlew no encuentra Java. Lo fijamos a un JDK 21 conocido.
          if [ -z "$JAVA_HOME" ]; then
            if [ -d "/Applications/Android Studio.app/Contents/jbr/Contents/Home" ]; then
              export JAVA_HOME="/Applications/Android Studio.app/Contents/jbr/Contents/Home"
            else
              export JAVA_HOME="$(/usr/libexec/java_home -v 21)"
            fi
          fi
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
