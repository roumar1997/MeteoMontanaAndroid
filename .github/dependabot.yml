# Escaneo de dependencias (riesgo señalado en la auditoría 2026-07-19).
# Solo AVISA con PRs — nada se actualiza sin revisión + CI verde + OK.
version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
