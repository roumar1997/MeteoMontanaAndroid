# Compila el AAB de RELEASE firmado SIN depender del PC de Rodrigo (riesgo
# señalado en la auditoría 2026-07-19: el proceso de release estaba atado a
# una máquina). Lanzamiento MANUAL (Actions → Android Release AAB → Run):
# nunca se dispara solo. El AAB firmado con la clave de SUBIDA solo sirve
# para subirlo a la cuenta de Play de Rodrigo (Play App Signing re-firma).
name: Android Release AAB

on:
  workflow_dispatch:

concurrency:
  group: android-release
  cancel-in-progress: true

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Restore google-services.json
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Restore release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > meteomontana-release.jks

      - name: Build signed AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:bundleRelease --stacktrace

      - name: Upload AAB (caduca en 1 día — descargar y subir a Play)
        uses: actions/upload-artifact@v4
        with:
          name: cumbre-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 1
