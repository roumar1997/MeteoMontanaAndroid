name: Android CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (con caché de dependencias)
        uses: gradle/actions/setup-gradle@v4

      # google-services.json está excluido de git (credenciales Firebase).
      # Si existe el secret GOOGLE_SERVICES_JSON (contenido del fichero real,
      # Settings → Secrets → Actions) se usa ese → el APK del artifact tiene
      # Firebase funcional (login Google, push). Si no, dummy solo-compilar.
      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          elif [ ! -f app/google-services.json ]; then
            cat > app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "ci-dummy",
              "storage_bucket": "ci-dummy.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": { "package_name": "com.meteomontana.android" }
                },
                "oauth_client": [],
                "api_key": [ { "current_key": "AIzaSyDUMMY-DUMMY-DUMMY-DUMMY-DUMMY-DUMMY" } ],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Build debug + unit tests
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug :app:testDebugUnitTest --stacktrace

      # APK instalable: Actions → run → Artifacts → app-debug-apk.
      # Permite probar en el móvil sin compilar en local (workflow GitHub-only).
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload test reports (solo si fallan)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/reports/tests/
            app/build/test-results/
