name: Android CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (con caché de dependencias)
        uses: gradle/actions/setup-gradle@v4

      # google-services.json está excluido de git (credenciales Firebase).
      # El plugin google-services solo necesita un fichero válido para compilar;
      # en CI usamos uno dummy con el applicationId real.
      - name: Create dummy google-services.json
        run: |
          if [ ! -f app/google-services.json ]; then
            cat > app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "ci-dummy",
              "storage_bucket": "ci-dummy.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": { "package_name": "com.meteomontana.android" }
                },
                "oauth_client": [],
                "api_key": [ { "current_key": "AIzaSyDUMMY-DUMMY-DUMMY-DUMMY-DUMMY-DUMMY" } ],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Build debug + unit tests
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug :app:testDebugUnitTest --stacktrace

      - name: Upload test reports (solo si fallan)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/reports/tests/
            app/build/test-results/
