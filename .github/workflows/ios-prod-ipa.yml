name: "iOS PROD .ipa (manual)"

on:
  workflow_dispatch: {}

concurrency:
  group: ios-prod-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-prod-ipa:
    runs-on: macos-15
    timeout-minutes: 60 # Reducido: si pasa de 60 min, algo va mal
    steps:
      - uses: actions/checkout@v4

      - name: Seleccionar Xcode
        run: sudo xcode-select -s "/Applications/Xcode_15.4.app" # Ajusta a la versión exacta de tu runner

      - name: Instalar certificados y perfiles
        env:
          CERT_P12: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_B64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Crear Keychain
          security create-keychain -p "ci-keychain" ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p "ci-keychain" ci.keychain
          
          # Instalar Certificado
          echo "$CERT_P12" | base64 -d > distribution.p12
          security import distribution.p12 -k ci.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci-keychain" ci.keychain
          
          # Instalar Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_B64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Preparar API Key
        env:
          API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_B64" | tr -d '\r' | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      - name: XcodeGen
        working-directory: iosApp
        run: xcodegen generate

      - name: Compilar Framework KMP
        run: ./gradlew :shared:embedAndSignAppleFrameworkForXcode -Pconfiguration=Release

      - name: Archive
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project iosApp/MeteoMontana.xcodeproj \
            -scheme MeteoMontana \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/MeteoMontana.xcarchive \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID"

      - name: Export y subir
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Usamos un ExportOptions directo para forzar la firma manual con el perfil instalado
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0"><dict><key>method</key><string>app-store</string><key>uploadSymbols</key><true/></dict></plist>' > ExportOptions.plist
          
          xcodebuild -exportArchive \
            -archivePath build/MeteoMontana.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID"

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-store-ipa
          path: build/export/*.ipa
