name: iOS PROD .ipa (manual)

# Compila la app iOS en configuración RELEASE, firmada con el certificado de
# distribución de App Store, y la sube automáticamente a App Store Connect.
#
# Secrets necesarios:
#   GOOGLE_SERVICE_INFO_PLIST          → GoogleService-Info.plist real de Firebase
#   DISTRIBUTION_CERTIFICATE_P12      → certificado Apple Distribution en base64
#   DISTRIBUTION_CERTIFICATE_PASSWORD → contraseña del .p12
#   PROVISIONING_PROFILE_BASE64       → perfil Cumbre App Store en base64
#   APP_STORE_CONNECT_API_KEY         → contenido del .p8 de la API Key
#   APP_STORE_CONNECT_KEY_ID          → Key ID (ej. 39CT43AKCN)
#   APP_STORE_CONNECT_ISSUER_ID       → Issuer ID (UUID)

on:
  workflow_dispatch: {}

concurrency:
  group: ios-prod-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-prod-ipa:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Seleccionar Xcode más reciente
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle (con caché de dependencias)
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'shared/build.gradle.kts') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('iosApp/project.yml') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Write GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          PLIST=iosApp/iosApp/GoogleService-Info.plist
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" > "$PLIST"
            echo "GoogleService-Info.plist escrito desde el secret."
          else
            echo "::warning::Sin secret GOOGLE_SERVICE_INFO_PLIST — usando dummy."
            cat > "$PLIST" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          <key>API_KEY</key><string>AIzaSyDUMMY</string>
          <key>GCM_SENDER_ID</key><string>000000000000</string>
          <key>PLIST_VERSION</key><string>1</string>
          <key>BUNDLE_ID</key><string>com.meteomontana.ios</string>
          <key>PROJECT_ID</key><string>ci-dummy</string>
          <key>STORAGE_BUCKET</key><string>ci-dummy.appspot.com</string>
          <key>IS_ADS_ENABLED</key><false/>
          <key>IS_ANALYTICS_ENABLED</key><false/>
          <key>IS_APPINVITE_ENABLED</key><true/>
          <key>IS_GCM_ENABLED</key><true/>
          <key>IS_SIGNIN_ENABLED</key><true/>
          <key>GOOGLE_APP_ID</key><string>1:000000000000:ios:0000000000000000000000</string>
          <key>CLIENT_ID</key><string>000000000000-dummy.apps.googleusercontent.com</string>
          <key>REVERSED_CLIENT_ID</key><string>com.googleusercontent.apps.000000000000-dummy</string>
          </dict>
          </plist>
          EOF
          fi

      - name: Instalar certificado de distribución
        env:
          CERT_P12: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_P12" | base64 --decode > /tmp/distribution.p12
          security create-keychain -p "ci-keychain" ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p "ci-keychain" ci.keychain
          security import /tmp/distribution.p12 -k ci.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci-keychain" ci.keychain
          security list-keychains -d user -s ci.keychain

      - name: Preparar API Key de App Store Connect
        env:
          API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_B64" | tr -d '\r' | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      - name: XcodeGen generate
        working-directory: iosApp
        run: xcodegen generate

      - name: Archive (iphoneos, RELEASE, firma automática)
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          chmod +x gradlew
          xcodebuild archive \
            -project iosApp/MeteoMontana.xcodeproj \
            -scheme MeteoMontana \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/MeteoMontana.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=3CP2YRJ579

      - name: Crear ExportOptions.plist
        run: |
          cat > ExportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>3CP2YRJ579</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Export y subir a App Store Connect
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath build/MeteoMontana.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID"
          IPA=$(find build/export -name "*.ipa" | head -1)
          echo "IPA: $IPA"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID"

      - name: Upload .ipa (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-store-ipa
          path: build/export/*.ipa
