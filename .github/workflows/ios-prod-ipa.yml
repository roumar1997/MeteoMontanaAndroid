name: "iOS PROD .ipa (manual)"

# Compila la app iOS en configuración RELEASE, firmada con el certificado de
# distribución de App Store, y la sube automáticamente a App Store Connect.
#
# Secrets necesarios:
#   GOOGLE_SERVICE_INFO_PLIST          → GoogleService-Info.plist real de Firebase
#   DISTRIBUTION_CERTIFICATE_P12      → certificado Apple Distribution en base64
#   DISTRIBUTION_CERTIFICATE_PASSWORD → contraseña del .p12
#   PROVISIONING_PROFILE_BASE64       → perfil Cumbre App Store en base64
#   APP_STORE_CONNECT_API_KEY         → contenido del .p8 de la API Key
#   APP_STORE_CONNECT_KEY_ID          → Key ID (ej. 39CT43AKCN)
#   APP_STORE_CONNECT_ISSUER_ID       → Issuer ID (UUID)

on:
  workflow_dispatch: {}

concurrency:
  group: ios-prod-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-prod-ipa:
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Seleccionar Xcode más reciente
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle (con caché de dependencias)
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'shared/build.gradle.kts') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Cache build KMP shared (shared/build)
        uses: actions/cache@v6
        with:
          path: |
            shared/build
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: kmp-build-${{ runner.os }}-${{ hashFiles('shared/src/**/*.kt', 'shared/build.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: kmp-build-${{ runner.os }}-

      - name: Cache SPM packages
        uses: actions/cache@v6
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('iosApp/project.yml') }}
          restore-keys: spm-${{ runner.os }}-

      # NOTA: aquí había un paso irgaly/xcode-cache que cacheaba DerivedData.
      # Restauraba un PIF (grafo de dependencias) obsoleto que registraba el
      # paquete GoogleSignIn dos veces al regenerar el proyecto con xcodegen
      # -> "PIFLoader: GUID ... has already been registered" -> ARCHIVE FAILED.
      # El último build que funcionó (30-jun) NO tenía esta caché. Quitada.
      # Firebase ya no se compila desde fuente (usa binarios pre-compilados en
      # project.yml), así que el DerivedData cacheado ya no era el gran ahorro.

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Write GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          PLIST=iosApp/iosApp/GoogleService-Info.plist
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" > "$PLIST"
            echo "GoogleService-Info.plist escrito desde el secret."
          else
            echo "::warning::Sin secret GOOGLE_SERVICE_INFO_PLIST — usando dummy."
            cat > "$PLIST" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          <key>API_KEY</key><string>AIzaSyDUMMY</string>
          <key>GCM_SENDER_ID</key><string>000000000000</string>
          <key>PLIST_VERSION</key><string>1</string>
          <key>BUNDLE_ID</key><string>com.meteomontana.ios</string>
          <key>PROJECT_ID</key><string>ci-dummy</string>
          <key>STORAGE_BUCKET</key><string>ci-dummy.appspot.com</string>
          <key>IS_ADS_ENABLED</key><false/>
          <key>IS_ANALYTICS_ENABLED</key><false/>
          <key>IS_APPINVITE_ENABLED</key><true/>
          <key>IS_GCM_ENABLED</key><true/>
          <key>IS_SIGNIN_ENABLED</key><true/>
          <key>GOOGLE_APP_ID</key><string>1:000000000000:ios:0000000000000000000000</string>
          <key>CLIENT_ID</key><string>000000000000-dummy.apps.googleusercontent.com</string>
          <key>REVERSED_CLIENT_ID</key><string>com.googleusercontent.apps.000000000000-dummy</string>
          </dict>
          </plist>
          EOF
          fi

      - name: Instalar certificado de distribución
        env:
          CERT_P12: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_P12" | base64 -d > /tmp/distribution.p12
          security create-keychain -p "ci-keychain" ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p "ci-keychain" ci.keychain
          security import /tmp/distribution.p12 -k ci.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci-keychain" ci.keychain
          security list-keychains -d user -s ci.keychain
          # Sin esto, macOS bloquea el keychain a los 5 min por defecto. El
          # Archive+Export con -allowProvisioningUpdates puede tardar más →
          # xcodebuild/codesign se cuelga pidiendo la contraseña por un prompt
          # gráfico que nunca aparece en el runner headless (colgado horas).
          security set-keychain-settings -t 3600 -u ci.keychain

      - name: Preparar API Key de App Store Connect
        env:
          API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_B64" | tr -d '\r' | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      - name: Generar e instalar perfil App Store (firma manual)
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          BUNDLE_ID: com.meteomontana.ios.3CP2YRJ579
          PROFILE_NAME: "Cumbre App Store CI"
        run: |
          # Crea por API un perfil App Store fresco (firmado con el certificado de
          # distribución instalado) y lo pone donde Xcode lo busca. Con esto la
          # firma es MANUAL y no se crea ningún certificado nuevo por build.
          API_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8" \
            node .github/scripts/asc_make_profile.js

      - name: XcodeGen generate
        working-directory: iosApp
        run: xcodegen generate

      - name: Compilar framework KMP (shared → iphoneos arm64)
        run: |
          chmod +x gradlew
          # Pre-compilamos el framework antes de xcodebuild para que su
          # preBuildScript lo encuentre ya compilado (Gradle incremental = no-op).
          # Todas las vars que el task embedAndSignAppleFrameworkForXcode exige.
          CONFIGURATION=Release \
          SDK_NAME=iphoneos \
          ARCHS=arm64 \
          TARGET_BUILD_DIR=/tmp/kmp-pre-build \
          FRAMEWORKS_FOLDER_PATH=Frameworks \
          EXPANDED_CODE_SIGN_IDENTITY=- \
          EXPANDED_CODE_SIGN_IDENTITY_HASH=- \
          CODE_SIGNING_ALLOWED=NO \
          PLATFORM_NAME=iphoneos \
          METAL_LIBRARY_OUTPUT_DIR=/tmp \
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode --stacktrace

      - name: Archive (iphoneos, RELEASE, firma manual)
        run: |
          chmod +x gradlew
          # Firma MANUAL: usa el certificado de distribución instalado + el perfil
          # "Cumbre App Store CI" (paso anterior). SIN -allowProvisioningUpdates,
          # para que Xcode NO cree certificados nuevos (agotaban el límite).
          xcodebuild archive \
            -project iosApp/MeteoMontana.xcodeproj \
            -scheme MeteoMontana \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/MeteoMontana.xcarchive \
            DEVELOPMENT_TEAM=3CP2YRJ579

      - name: Crear ExportOptions.plist
        run: |
          # destination=export: xcodebuild solo EXPORTA el .ipa firmado a disco
          # (no intenta subir). La subida la hace altool después, que da errores
          # explícitos. Antes usábamos destination=upload, pero fallaba con un
          # "Error Downloading App Information" opaco sin decir la causa.
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0"><dict>' \
            '  <key>method</key><string>app-store-connect</string>' \
            '  <key>teamID</key><string>3CP2YRJ579</string>' \
            '  <key>signingStyle</key><string>manual</string>' \
            '  <key>provisioningProfiles</key>' \
            '  <dict><key>com.meteomontana.ios.3CP2YRJ579</key><string>Cumbre App Store CI</string></dict>' \
            '  <key>uploadSymbols</key><true/>' \
            '  <key>uploadBitcode</key><false/>' \
            '  <key>destination</key><string>export</string>' \
            '</dict></plist>' > ExportOptions.plist

      - name: Exportar .ipa firmado a disco
        run: |
          # Firma manual: usa el perfil instalado. Sin -allowProvisioningUpdates.
          xcodebuild -exportArchive \
            -archivePath build/MeteoMontana.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist
          echo "Export OK. IPA en build/export/ (se sube como artifact aunque la subida a ASC falle)."

      - name: Subir a App Store Connect (altool --verbose)
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA="$(ls build/export/*.ipa | head -1)"
          echo "Subiendo: $IPA"
          # altool lee la key de ~/.appstoreconnect/private_keys/AuthKey_<KEY_ID>.p8
          # --verbose da mensajes claros: app inexistente, bundle id, permisos, etc.
          # OJO: altool a veces imprime ERROR pero devuelve exit 0 (falso verde),
          # y también imprime "ERROR: ... WILL RETRY" en reintentos de red que
          # acaban bien (falso rojo el 2026-07-10). El único veredicto fiable es
          # la línea final: exigimos "UPLOAD SUCCEEDED" explícito.
          set -o pipefail
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$KEY_ID" --apiIssuer "$ISSUER_ID" --verbose 2>&1 | tee /tmp/altool.log || true
          if ! grep -qi "UPLOAD SUCCEEDED" /tmp/altool.log; then
            echo "::error::altool no reportó UPLOAD SUCCEEDED (ver log de arriba)."
            exit 1
          fi
          echo "Subida a App Store Connect OK."

      - name: Volcar logs de distribución (solo si algo falla)
        if: failure()
        run: |
          echo "=== xcdistributionlogs (causa detallada del fallo de export/subida) ==="
          find "$TMPDIR" /var/folders -type d -name "*.xcdistributionlogs" 2>/dev/null | while read -r d; do
            echo "########## $d"
            find "$d" -type f \( -name "*.log" -o -name "*.txt" \) 2>/dev/null | while read -r f; do
              echo "----- $f -----"
              cat "$f" 2>/dev/null || true
            done
          done

      - name: Upload .ipa (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-store-ipa
          path: build/export/*.ipa
          if-no-files-found: warn
          retention-days: 7

      - name: Upload dSYM (símbolos para traducir crashes)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-dsyms
          path: build/MeteoMontana.xcarchive/dSYMs/**
          if-no-files-found: warn
          # 30 días: los dSYM sirven para traducir crashes de esa versión
          # mientras esté en revisión/reciente; luego ya no hacen falta aquí.
          retention-days: 30
